<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found | Vansh</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%230c0b10'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='70' y1='5' x2='50' y2='95' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0%25' stop-color='%23c7d2fe'/%3E%3Cstop offset='40%25' stop-color='%23818cf8'/%3E%3Cstop offset='100%25' stop-color='%236366f1'/%3E%3C/linearGradient%3E%3Cfilter id='gl'%3E%3CfeGaussianBlur stdDeviation='2' result='b'/%3E%3CfeMerge%3E%3CfeMergeNode in='b'/%3E%3CfeMergeNode in='SourceGraphic'/%3E%3C/feMerge%3E%3C/filter%3E%3C/defs%3E%3Cpath d='M10 12 L25 12 L50 80 L38 80 Z' fill='rgba(99,102,241,0.2)'/%3E%3Cpath d='M75 12 L90 12 L62 80 L50 80 Z' fill='rgba(99,102,241,0.12)'/%3E%3Cpath d='M90 12 L62 80' stroke='url(%23g)' stroke-width='3' stroke-linecap='round' filter='url(%23gl)'/%3E%3Cpath d='M75 12 L50 80' stroke='url(%23g)' stroke-width='1.2' stroke-linecap='round' opacity='0.5'/%3E%3Cpath d='M75 12 L90 12' stroke='url(%23g)' stroke-width='2.5' stroke-linecap='round' filter='url(%23gl)'/%3E%3C/svg%3E"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0c0b10;
      color: #eeedf5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    .container {
      text-align: center;
      max-width: 600px;
      position: relative;
      z-index: 10;
      animation: fadeIn 0.8s ease-out;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .error-code {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 300;
      line-height: 1;
      background: linear-gradient(135deg, #c7d2fe 0%, #818cf8 50%, #6366f1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
      animation: glowPulse 3s ease-in-out infinite;
    }
    
    @keyframes glowPulse {
      0%, 100% {
        filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.3));
      }
      50% {
        filter: drop-shadow(0 0 40px rgba(99, 102, 241, 0.5));
      }
    }
    
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.75rem, 5vw, 3rem);
      font-weight: 400;
      margin-bottom: 1.25rem;
      color: #eeedf5;
      letter-spacing: -0.01em;
    }
    
    p {
      font-size: clamp(1rem, 2vw, 1.125rem);
      color: rgba(238, 237, 245, 0.55);
      margin-bottom: 2.5rem;
      line-height: 1.7;
      font-weight: 300;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2.5rem;
      background: #6366f1;
      color: white;
      text-decoration: none;
      border-radius: 9999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }
    
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    
    .btn:hover {
      background: #4f46e5;
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
    }
    
    .btn:hover::before {
      opacity: 1;
    }
    
    .btn:active {
      transform: translateY(-1px);
    }
    
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.025;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
    }
    
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 8s ease-in-out infinite;
    }
    
    .orb-1 {
      top: 20%;
      left: 10%;
      width: 300px;
      height: 300px;
      background: rgba(99, 102, 241, 0.08);
    }
    
    .orb-2 {
      bottom: 20%;
      right: 10%;
      width: 250px;
      height: 250px;
      background: rgba(139, 92, 246, 0.06);
      animation-delay: -4s;
    }
    
    @keyframes orbFloat {
      0%, 100% { 
        transform: translateY(0) scale(1); 
      }
      50% { 
        transform: translateY(-30px) scale(1.1); 
      }
    }
    
    .code-hint {
      margin-top: 3rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: rgba(238, 237, 245, 0.25);
      letter-spacing: 0.1em;
    }
    
    @media (max-width: 640px) {
      body {
        padding: 1.5rem;
      }
      
      .error-code {
        margin-bottom: 1rem;
      }
      
      h1 {
        margin-bottom: 1rem;
      }
      
      p {
        margin-bottom: 2rem;
      }
      
      .btn {
        padding: 0.875rem 2rem;
        font-size: 0.7rem;
      }
      
      .code-hint {
        margin-top: 2rem;
        font-size: 0.65rem;
      }
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  
  <div class="container">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="btn">
      <span>← Back to Home</span>
    </a>
    <div class="code-hint">
      ERROR_CODE: PAGE_NOT_FOUND
    </div>
  </div>
</body>
</html>
