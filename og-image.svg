<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0e0d0b"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(240,235,227,0.04)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(200,144,106,0.08)"/>
      <stop offset="100%" stop-color="rgba(200,144,106,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1200" height="2" fill="#c8906a" opacity="0.6"/>

  <!-- Dot + name -->
  <circle cx="96" cy="80" r="5" fill="#c8906a"/>
  <text x="112" y="88" font-family="monospace" font-size="14" fill="rgba(240,235,227,0.5)" letter-spacing="4" text-transform="uppercase">VANSH</text>

  <!-- Main headline -->
  <text x="96" y="290" font-family="Georgia, serif" font-size="72" fill="#f0ebe3" font-style="italic">Code that thinks.</text>
  <text x="96" y="380" font-family="Georgia, serif" font-size="72" fill="#c8906a" font-style="italic">Interfaces that feel.</text>

  <!-- Subtitle -->
  <text x="96" y="450" font-family="monospace" font-size="18" fill="rgba(240,235,227,0.4)" letter-spacing="2">Full-Stack Developer · Frontend · Backend · AI/ML</text>

  <!-- Bottom right URL -->
  <text x="1104" y="570" font-family="monospace" font-size="14" fill="rgba(240,235,227,0.25)" text-anchor="end" letter-spacing="2">vansh.dev</text>
</svg>
